<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    padding-top:100px;
}

input{
    width:300px;
    padding:10px;
    margin:10px;
}

button{
    width:320px;
    padding:12px;
    background:orange;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Admin Login</h1>

<input type="email" id="email" placeholder="Admin Email">
<br>

<input type="password" id="password" placeholder="Password">
<br>

<button onclick="adminLogin()">Login</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDG5Xj9NjKaOSPhrUx3b5NJEEHcAOWNybQ",
  authDomain: "basic-lms-3c0e2.firebaseapp.com",
  projectId: "basic-lms-3c0e2",
  storageBucket: "basic-lms-3c0e2.firebasestorage.app",
  messagingSenderId: "1052228849895",
  appId: "1:1052228849895:web:b0e57660ca0a3609cdd242"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* IMPORTANT */
const ADMIN_EMAIL = "middealogy259@gmail.com";

async function adminLogin(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{

        const result = await auth.signInWithEmailAndPassword(
            email,
            password
        );

        if(result.user.email === ADMIN_EMAIL){

            window.location.href = "admin-dashboard.html";

        }else{

            alert("Not an Admin");
            await auth.signOut();

        }

    }
    catch(error){

        alert(error.message);

    }

}

</script>

</body>
</html>
