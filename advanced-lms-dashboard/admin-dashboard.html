<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.logout{
    background:red;
    color:white;
}

.card{
    cursor: pointer;
}
</style>

</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
</header>

<div class="container">

    <div class="card" onclick="window.location.href='manage-courses.html'">
    <h2>Manage Courses</h2>
    <p>Add, Edit and Delete Courses</p>
</div>

<div class="card" onclick="window.location.href='manage-students.html'">
    <h2>Manage Students</h2>
    <p>View Registered Students</p>
</div>

<div class="card" onclick="window.location.href='reports.html'">
    <h2>Reports</h2>
    <p>View LMS Statistics</p>
</div>

<script>
function logout(){
    window.location.href="index.html";
}
</script>

</body>
</html>
